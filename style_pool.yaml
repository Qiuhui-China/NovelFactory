# ============================================================
# 风格元素池 — 主编Agent从这里挑选组合
# ============================================================

tracks:
  - name: "女配觉醒"
    desc: "穿书/重生成原著恶毒女配/炮灰/替身，利用对剧情的了解改命逆袭"
    tags: ["打脸逆袭", "女配", "爽文"]
    variants:
      - "穿书成被渣男骗走公司的恶毒女配，用商业知识反杀"
      - "重生成替身，知道自己会被抛弃，提前布局全身而退"
      - "穿书成炮灰千金，原著第三章就死，决定搞事业不嫁人"
      - "穿书成恶毒继母，原著里虐待男主，这辈子把他培养成大佬"
      - "穿书成被冒领功劳的真千金，这次不忍了"
      - "穿书成豪门弃妇，知道前夫公司要上市，提前分财产"
      - "重生到被陷害入狱前一天，这次让陷害她的人进去"
      - "穿书成恶毒女配发现原女主才是真绿茶"

  - name: "身份反转"
    desc: "主角隐藏真实身份/能力，所有人低估ta，真相揭开瞬间最爽"
    tags: ["甜宠", "反转", "现代", "打脸逆袭"]
    variants:
      - "假装失忆，看所有人原形毕露"
      - "被豪门赶出去的真千金，其实自己比豪门更有钱"
      - "装穷嫁人，老公不知道她是隐藏富婆"
      - "相亲被嫌弃丑，对方后来发现她是顶头上司"
      - "被公司开除的实习生，其实是匿名技术大佬"
      - "离婚后前夫发现她是自己一直在找的神秘合作方"
      - "被全网嘲的素人，其实是隐退的行业传奇"
      - "假装普通保姆进豪门，实际身份吓死人"

  - name: "脑洞搞笑"
    desc: "荒诞有趣的设定，主角一本正经地应对不正经的世界"
    tags: ["搞笑轻松", "脑洞", "反转"]
    variants:
      - "全家都是反派/大佬，就我一个普通人"
      - "系统给的任务越来越离谱，但奖励太香了不得不做"
      - "弹幕剧透了所有人的秘密，只有我能看到"
      - "直播间观众全是大佬，以为我在装傻其实我是真傻"
      - "穿书到古代但只会做饭，靠厨艺封神"
      - "全员NPC只有我是真人，但他们不知道"
      - "死对头假失忆缠上我，我将计就计反撩"
      - "被困在同一天循环，但每次醒来身份不同"

protagonist_voices:
  - id: "社恐毒舌"
    desc: "人前沉默，脑内弹幕疯狂吐槽"
    sample: "呵。他这表情，像极了我家楼下被抢了骨头的泰迪。"
  - id: "佛系暴击"
    desc: "平时随便无所谓，踩底线瞬间变脸"
    sample: "哦。行吧。——不行。"
  - id: "假笨真精"
    desc: "看起来迷糊冒失，实际每步都算好了"
    sample: "啊？这个好难哦——（已经算出三种可能性并选了最优解）"
  - id: "野生大佬"
    desc: "没背景但天赋碾压，说话直愣愣一脸无辜"
    sample: "不是，这不是常识吗？你们居然不知道？"
  - id: "嘴硬心软"
    desc: "嘴上刻薄实际默默帮人，被发现后死不承认"
    sample: "谁帮你了？我只是顺手。——别哭啊烦死了。"
  - id: "疯批美人"
    desc: "笑着说最狠的话，温柔外表下全是算计"
    sample: "姐姐，我帮你哦。——帮你认清现实。"

humor_styles:
  - id: "脑内弹幕"
    desc: "表面正经，内心疯狂吐槽，反差制造笑点"
  - id: "一本正经胡说八道"
    desc: "用极其认真的态度处理荒诞的事，读者笑她认真"
  - id: "冷幽默"
    desc: "不刻意搞笑，偶尔一句冷不丁的话让人喷饭"
  - id: "毒舌互怼"
    desc: "角色之间互损，嘴上不饶人但关系亲近"
  - id: "自嘲式"
    desc: "女主自己吐槽自己的处境，苦中作乐"

face_slap_styles:
  - "四两拨千斤：轻描淡写一句话让对方闭嘴"
  - "甩信息差：拿出对方不知道你掌握的证据/信息"
  - "装傻充愣型：对方以为赢了结果发现被反杀"
  - "借力打力：让对手的攻击反噬自己"
  - "群众打脸：不用自己动手，围观群众帮着打"

romance_flavors:
  - "嘴硬互怼型：吵着吵着就亲上了"
  - "并肩作战型：一起搞事的过程中日久生情"
  - "高冷慢热型：男方从看不起到真香"
  - "欢喜冤家型：天天互坑但离不开对方"
  - "暗中守护型：默默帮她但不说，她后来才发现"
